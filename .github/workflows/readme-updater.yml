name: Update README

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".github/**"

  schedule:
    - cron: "0 8 * * 1" # every Monday 08:00 UTC

  workflow_dispatch:
    inputs:
      force:
        description: "Force update even if README looks current"
        type: boolean
        default: false

concurrency:
  group: readme-updater
  cancel-in-progress: false

jobs:
  update-readme:
    name: Analyse & Update README
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Verify gh auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Configure git identity
        run: |
          git config user.name  "readme-updater[bot]"
          git config user.email "readme-updater[bot]@users.noreply.github.com"

      - name: Run readme-updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_UPDATE: ${{ inputs.force || 'false' }}
        run: python3 .github/scripts/update_readme.py
